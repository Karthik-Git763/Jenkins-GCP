<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Info - DevOps Assignment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card h1 {
            margin-bottom: 30px;
            color: #00d2ff;
            font-size: 1.5rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .label {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #00d2ff;
        }

        .loading {
            color: #888;
            font-style: italic;
        }

        .error {
            color: #ff4444;
        }

        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .status.connected {
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
        }

        .status.disconnected {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>DevOps Assignment - Jenkins CI/CD</h1>
            <div class="info-row">
                <span class="label">Name</span>
                <span class="value" id="student-name">Loading...</span>
            </div>
            <div class="info-row">
                <span class="label">Roll Number</span>
                <span class="value" id="student-roll">Loading...</span>
            </div>
            <div class="status" id="api-status">
                Connecting to backend API...
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
